name: Release

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: cc-yes-darwin-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: cc-yes-darwin-x64
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: cc-yes-linux-x64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: cc-yes-linux-arm64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: cc-yes-win-x64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == *"windows"* ]]; then
            cp target/${{ matrix.target }}/release/cc-yes.exe ${{ matrix.artifact }}
          else
            cp target/${{ matrix.target }}/release/cc-yes ${{ matrix.artifact }}
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        run: |
          mkdir -p dist
          find artifacts -type f -exec cp {} dist/ \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
